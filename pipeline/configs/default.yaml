# ===== Model Profiles =====
# Switch via MODEL_PROFILE env var (default: "default")
# API keys are resolved from api_key_env field at runtime
models:
  default:
    l1:
      api_key_env: "GLM_API_KEY"
      base_url: "https://open.bigmodel.cn/api/paas/v4"
      model: "glm-4.7"
      max_tokens: 1024
      extra_body:
        thinking:
          type: disabled
    l2:
      api_key_env: "GLM_API_KEY"
      base_url: "https://open.bigmodel.cn/api/paas/v4"
      model: "glm-4.7"
      max_tokens: 4096
      extra_body:
        thinking:
          type: disabled
    l3:
      api_key_env: "GLM_API_KEY"
      base_url: "https://open.bigmodel.cn/api/paas/v4"
      model: "glm-5.1"
      max_tokens: 8192
      extra_body:
        thinking:
          type: disabled

